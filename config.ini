[SETTINGS]
# Ollama Server URL (Standard: http://localhost:11434)
OLLAMA_URL = http://localhost:11434

# LLM-Provider: 'ollama' (lokal offline), 'gemini' (Google AI Studio online) oder 'openai' (OpenAI online)
LLM_PROVIDER = gemini

# Modellname je nach Provider:
# - Für gemini: gemini-1.5-flash (empfohlen), gemini-1.5-pro
# - Für openai: gpt-4o-mini (empfohlen), gpt-4o
# - Für ollama: gemma2:9b (empfohlen), gemma4:12b
LLM_MODEL = gemini-1.5-flash

# API-Key für Online-Modelle (Gemini oder OpenAI).
# Kann leer gelassen werden, wenn stattdessen die Umgebungsvariablen GEMINI_API_KEY oder OPENAI_API_KEY gesetzt sind.
API_KEY = 


# Whisper Modellgröße: tiny, base, small, medium, large-v3, large-v3-turbo
WHISPER_MODEL = large-v3-turbo

# Whisper Rechengenauigkeit: int8 (spart VRAM), float16 (bessere Qualität)
WHISPER_COMPUTE_TYPE = int8

# Chunk-Dauer in Sekunden für Pseudo-Streaming (empfohlen: 6-8 für bessere Spracherkennung)
CHUNK_DURATION = 7

# STT Engine: 'google' (online, live streaming) oder 'whisper' (offline, batch)
STT_ENGINE = google

# Dateiname der Google Cloud JSON-Schlüsseldatei (muss im Hauptverzeichnis liegen)
GOOGLE_JSON_FILENAME = rakscribe-0ff1ffd128a1.json